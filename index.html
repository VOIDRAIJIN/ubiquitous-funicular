<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Editor Resource Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;

  /* Background image */
  background: url("bgpict.jpeg") no-repeat center center fixed;
  background-size: cover;
}

/* Dark overlay */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.75);
  z-index: -1;
}

header {
  text-align: center;
  padding: 20px;
  background: rgba(0,0,0,0.7);
}

input {
  padding: 10px;
  width: 60%;
  border-radius: 10px;
  border: none;
}

nav {
  text-align: center;
  margin: 10px;
}

button {
  margin: 5px;
  padding: 10px 15px;
  border: none;
  background: #222;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  background: #444;
}

#resourceContainer {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: rgba(20,20,20,0.9);
  border-radius: 15px;
  padding: 10px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

video, img {
  width: 100%;
  border-radius: 10px;
}

.download {
  margin-top: 10px;
  display: inline-block;
  padding: 8px 12px;
  background: #00ffcc;
  color: black;
  border-radius: 8px;
  text-decoration: none;
}
</style>
</head>

<body>

<header>
  <h1>🎬 Editor Resource Hub</h1>
  <input type="text" id="search" placeholder="Search clips, presets, packs...">
</header>

<nav>
  <button onclick="filterCategory('all')">All</button>
  <button onclick="filterCategory('clips')">Clips</button>
  <button onclick="filterCategory('packs')">Packs</button>
  <button onclick="filterCategory('overlays')">Overlays</button>
</nav>

<main id="resourceContainer"></main>

<script>
const resources = [
  { title: "Cinematic Clip Pack", category: "clips", type: "video", src: "https://www.w3schools.com/html/mov_bbb.mp4", download: "#" },
  { title: "Velocity Edit Pack", category: "packs", type: "image", src: "https://via.placeholder.com/300x200?text=Velocity+Pack", download: "#" },
  { title: "Light Leak Overlay", category: "overlays", type: "video", src: "https://www.w3schools.com/html/movie.mp4", download: "#" },

  { title: "Anime Clips Pack", category: "clips", type: "image", src: "https://via.placeholder.com/300x200?text=Anime+Clips", download: "#" },
  { title: "Glitch Overlay Pack", category: "overlays", type: "image", src: "https://via.placeholder.com/300x200?text=Glitch+Overlay", download: "#" },
  { title: "Transitions Pack", category: "packs", type: "image", src: "https://via.placeholder.com/300x200?text=Transitions", download: "#" },
  { title: "TikTok Viral Clips", category: "clips", type: "video", src: "https://www.w3schools.com/html/mov_bbb.mp4", download: "#" },
  { title: "Fire Effects Overlay", category: "overlays", type: "image", src: "https://via.placeholder.com/300x200?text=Fire+Overlay", download: "#" },
  { title: "Sound Effects Pack", category: "packs", type: "image", src: "https://via.placeholder.com/300x200?text=SFX+Pack", download: "#" },
  { title: "Gaming Montage Clips", category: "clips", type: "video", src: "https://www.w3schools.com/html/movie.mp4", download: "#" },
  { title: "Neon Overlay Pack", category: "overlays", type: "image", src: "https://via.placeholder.com/300x200?text=Neon+Overlay", download: "#" },
  { title: "Colour Grading Pack", category: "packs", type: "image", src: "Colour.avif", download: "ARCANE CC PACK (3 CCS).zip" },
  { title: "Slow Motion Clips", category: "clips", type: "video", src: "https://www.w3schools.com/html/mov_bbb.mp4", download: "#" },
  { title: "Particles Overlay", category: "overlays", type: "image", src: "https://via.placeholder.com/300x200?text=Particles", download: "#" },
  { title: "Premium Editing Pack", category: "packs", type: "image", src: "https://via.placeholder.com/300x200?text=Premium+Pack", download: "#" }
];

const container = document.getElementById("resourceContainer");
const searchInput = document.getElementById("search");

function displayResources(list) {
  container.innerHTML = "";

  list.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    let preview;
    if (item.type === "video") {
      preview = `<video controls src="${item.src}"></video>`;
    } else {
      preview = `<img src="${item.src}" />`;
    }

    card.innerHTML = `
      <h3>${item.title}</h3>
      ${preview}
      <a class="download" href="${item.download}" download>Download</a>
    `;

    container.appendChild(card);
  });
}

function filterCategory(category) {
  if (category === "all") {
    displayResources(resources);
  } else {
    const filtered = resources.filter(r => r.category === category);
    displayResources(filtered);
  }
}

searchInput.addEventListener("input", () => {
  const value = searchInput.value.toLowerCase();
  const filtered = resources.filter(r =>
    r.title.toLowerCase().includes(value)
  );
  displayResources(filtered);
});

displayResources(resources);
</script>

</body>
</html>
